name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        # Та же мажорная версия, что и на проде (docker-compose.prod.yml)
        image: postgres:17-alpine
        env:
          POSTGRES_DB: horsebio_test
          POSTGRES_USER: horsebio
          POSTGRES_PASSWORD: horsebio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U horsebio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run tests
        run: python manage.py test
        working-directory: backend
        env:
          SECRET_KEY: ci-test-only
          DEBUG: 'True'
          POSTGRES_DB: horsebio_test
          POSTGRES_USER: horsebio
          POSTGRES_PASSWORD: horsebio
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: '5432'

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/horsebio-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Write env files to server
        uses: appleboy/ssh-action@v1
        env:
          BACKEND_ENV_PROD: ${{ secrets.BACKEND_ENV_PROD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: BACKEND_ENV_PROD,POSTGRES_PASSWORD
          script: |
            mkdir -p /root/horsebio/backend
            printf '%s' "$BACKEND_ENV_PROD" > /root/horsebio/backend/.env.prod
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD" > /root/horsebio/.env

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/root/horsebio"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /root/horsebio
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d --force-recreate backend
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate
            docker image prune -f
